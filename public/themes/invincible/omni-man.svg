  <rect x="65" y="115" width="70" height="90" fill="white" rx="12"/>
  
  <!-- Dettagli costume -->
  <rect x="60" y="175" width="80" height="18" fill="#ED1C24"/>
  
  <!-- Gambe -->
  <rect x="72" y="193" width="24" height="65" fill="white" rx="10"/>
